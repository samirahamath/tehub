  <text x="160" y="122" font-family="'Geist Mono', monospace" font-size="14" fill="#80807A">tehub-inbox-listener.py</text>
  <text x="140" y="190" font-family="'Geist Mono', monospace" font-size="16" fill="#D4FF3D">await tehub.inbox.listen(async (email) => {</text>
  <text x="180" y="230" font-family="'Geist Mono', monospace" font-size="16" fill="#F4F4F0">console.log(Received brief from );</text>
  <text x="180" y="270" font-family="'Geist Mono', monospace" font-size="16" fill="#F4F4F0">const technicalReview = await processBrief(email.content);</text>
  <text x="180" y="310" font-family="'Geist Mono', monospace" font-size="16" fill="#F4F4F0">await email.reply(technicalReview);</text>
